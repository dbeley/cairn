<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cairn — Offline Knowledge Hub</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-green: #3fb950;
      --accent-orange: #d2991d;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    header {
      text-align: center;
      margin-bottom: 3rem;
      padding: 2rem 0;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--text-muted); font-size: 1.1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--accent); }
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .card-icon { font-size: 1.4rem; }
    .card-title { font-size: 1rem; font-weight: 600; }
    .card-desc { color: var(--text-muted); font-size: 0.85rem; line-height: 1.4; }
    .card a {
      display: inline-block;
      margin-top: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .card a:hover { text-decoration: underline; }
    .status { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; margin-left: auto; }
    .status.online { background: #1a3a2a; color: var(--accent-green); }
    .status.offline { background: #3a2a1a; color: var(--accent-orange); }
    footer {
      text-align: center;
      margin-top: 4rem;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Cairn <span>⛰️</span></h1>
      <p class="subtitle">Offline Knowledge, AI &amp; Education — Your data, your hardware.</p>
    </header>

    <div class="grid" id="services">
      <!-- Populated by JS below -->
    </div>

    <footer>
      Cairn — Declarative offline knowledge server powered by NixOS.
      <br>Edit your <code>configuration.nix</code> to add or remove services.
    </footer>
  </div>

  <script>
    // Static service catalog — shows what Cairn can offer.
    // Links are relative; Caddy reverse proxies each path to the backend.
    // Green dot = link active; orange = click to see.
    const services = [
      { icon: "📚", name: "Knowledge (Kiwix)", desc: "Offline Wikipedia, ebooks, and reference materials.",   path: "/kiwix",    color: "online" },
      { icon: "🤖", name: "AI Chat (Open WebUI)",  desc: "Chat with local LLMs — private, GPU-accelerated, with document RAG.", path: "/chat",     color: "online" },
      { icon: "🎓", name: "Education (Kolibri)",       desc: "Khan Academy courses with progress tracking.",        path: "/learn",    color: "offline" },
      { icon: "🗺️", name: "Offline Maps",              desc: "Street-level maps for your region, no internet needed.", path: "/maps",     color: "offline" },
      { icon: "📖", name: "Ebook Library",             desc: "Calibre-Web — browse and read your ebook collection.", path: "/books",    color: "offline" },
      { icon: "📄", name: "Documents (Paperless)",     desc: "Search, tag, and organize your PDF collection.",       path: "/docs",     color: "offline" },
      { icon: "🎵", name: "Music (Navidrome)",          desc: "Stream your music library, offline.",                  path: "/music",    color: "offline" },
      { icon: "🎬", name: "Media (Jellyfin)",           desc: "Movies, TV shows — your personal streaming server.",   path: "/media",    color: "offline" },
      { icon: "🔧", name: "Data Tools (CyberChef)",    desc: "Encode, decode, encrypt, hash — swiss army knife.",   path: "/tools",    color: "online" },
      { icon: "📝", name: "Notes",           desc: "Local markdown note-taking, always available.",        path: "/notes",    color: "offline" },
      { icon: "📁", name: "File Browser",              desc: "Browse and manage files on your Cairn server.",        path: "/files",    color: "offline" },
      { icon: "🔐", name: "Passwords (Vaultwarden)",   desc: "Self-hosted password manager, offline-capable.",       path: "/vault",    color: "offline" },
      { icon: "🔄", name: "Sync (Syncthing)",            desc: "Peer-to-peer file sync with your other devices.",      path: "/sync",     color: "offline" },
      { icon: "🗄️", name: "Git (Gitea)",               desc: "Local Git server for your code and documentation.",      path: "/git",      color: "offline" },
    ];

    const grid = document.getElementById("services");
    services.forEach(s => {
      const statusClass = s.color === "online" ? "online" : "offline";
      const statusText = s.color === "online" ? "active" : "available";
      grid.innerHTML += `
        <div class="card">
          <div class="card-header">
            <span class="card-icon">${s.icon}</span>
            <span class="card-title">${s.name}</span>
            <span class="status ${statusClass}">${statusText}</span>
          </div>
          <div class="card-desc">${s.desc}</div>
          <a href="${s.path}" target="_blank">Open →</a>
        </div>
      `;
    });
  </script>
</body>
</html>
